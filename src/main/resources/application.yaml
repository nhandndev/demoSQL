spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demosql?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /demosql
jwt:
  signerKey: 1234567890123456789012345678901234567890123456789012345678901234;
  valid-duration: 60 #in second
  refreshable-duration: 120 #in seconds